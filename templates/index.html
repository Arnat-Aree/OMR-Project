<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OMR — ตรวจกระดาษคำตอบ 100 ข้อ</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg:       #f5f4f1;
  --surface:  #ffffff;
  --border:   #e0ddd6;
  --border2:  #c8c5bc;
  --text:     #1a1a18;
  --muted:    #6b6963;
  --hint:     #a09d97;
  --green:    #3B6D11; --green-bg: #EAF3DE;
  --red:      #A32D2D; --red-bg:   #FCEBEB;
  --amber:    #854F0B; --amber-bg: #FAEEDA;
  --blue:     #185FA5; --blue-bg:  #E6F1FB;
  --radius:   10px; --radius-sm: 6px;
}
body { font-family: 'Segoe UI','Noto Sans Thai',system-ui,sans-serif; background:var(--bg); color:var(--text); font-size:14px; min-height:100vh; }
.shell { max-width:1280px; margin:0 auto; padding:24px 20px; }
.header { display:flex; align-items:center; gap:12px; margin-bottom:24px; padding-bottom:16px; border-bottom:1px solid var(--border); }
.header h1 { font-size:18px; font-weight:600; }
.badge { font-size:11px; padding:3px 10px; border-radius:20px; background:var(--blue-bg); color:var(--blue); border:1px solid #85B7EB; }
.main { display:grid; grid-template-columns:290px 1fr; gap:16px; align-items:start; }
@media(max-width:820px){ .main{grid-template-columns:1fr} }

/* Cards */
.card { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:16px; margin-bottom:12px; }
.card-title { font-size:11px; font-weight:600; letter-spacing:.06em; color:var(--muted); text-transform:uppercase; margin-bottom:12px; }

/* Upload */
.upload-zone { border:2px dashed var(--border2); border-radius:var(--radius); padding:24px 16px; text-align:center; cursor:pointer; transition:all .15s; }
.upload-zone:hover,.upload-zone.drag { border-color:var(--blue); background:var(--blue-bg); }
.upload-icon { width:40px; height:40px; margin:0 auto 10px; background:var(--bg); border-radius:50%; display:flex; align-items:center; justify-content:center; border:1px solid var(--border); }
.upload-zone p { font-size:13px; color:var(--muted); }
.upload-zone small { font-size:11px; color:var(--hint); }
#file-input { display:none; }
#preview-img { width:100%; border-radius:var(--radius-sm); border:1px solid var(--border); display:none; margin-top:10px; max-height:200px; object-fit:contain; background:var(--bg); }

/* Key */
.key-field { width:100%; padding:8px 10px; border:1px solid var(--border2); border-radius:var(--radius-sm); font-family:'Cascadia Code','Consolas',monospace; font-size:13px; letter-spacing:.04em; background:var(--surface); color:var(--text); outline:none; transition:border-color .15s; }
.key-field:focus { border-color:var(--blue); }
.key-field::placeholder { font-family:'Segoe UI',sans-serif; letter-spacing:0; color:var(--hint); }
.key-grid { display:grid; grid-template-columns:repeat(10,1fr); gap:3px; margin-top:8px; max-height:130px; overflow-y:auto; }
.kp { padding:2px 4px; border-radius:3px; font-size:10px; font-family:monospace; text-align:center; background:var(--bg); border:1px solid var(--border); color:var(--muted); }
.kp.set { background:var(--green-bg); color:var(--green); border-color:#97C459; }

/* Params */
.param-grid { display:grid; grid-template-columns:1fr 1fr; gap:6px; }
.param { border:1px solid var(--border); border-radius:var(--radius-sm); padding:7px 9px; background:var(--bg); }
.param label { font-size:10px; color:var(--muted); display:block; margin-bottom:2px; }
.param input { width:100%; border:none; background:transparent; color:var(--text); font-size:13px; outline:none; }

/* Buttons */
.btn { display:inline-flex; align-items:center; gap:6px; padding:8px 18px; border-radius:var(--radius-sm); border:1px solid var(--border2); background:var(--surface); color:var(--text); font-size:13px; cursor:pointer; transition:all .15s; }
.btn:hover { background:var(--bg); border-color:var(--text); }
.btn.primary { background:var(--text); color:var(--surface); border-color:var(--text); font-weight:500; }
.btn.primary:hover { opacity:.85; }
.btn.primary:disabled { opacity:.35; cursor:not-allowed; }
.btn.sm { padding:5px 12px; font-size:12px; }
.btn-row { display:flex; gap:6px; flex-wrap:wrap; margin-top:10px; }

/* Steps */
.steps { display:flex; gap:4px; flex-wrap:wrap; margin-bottom:10px; }
.step { padding:3px 10px; border-radius:20px; font-size:11px; border:1px solid var(--border); color:var(--hint); transition:all .2s; }
.step.done { background:var(--green-bg); color:var(--green); border-color:#97C459; }
.step.run  { background:var(--blue-bg);  color:var(--blue);  border-color:#85B7EB; }
.step.err  { background:var(--red-bg);   color:var(--red);   border-color:#F09595; }

/* Log */
.log { background:#1e1e1e; color:#ccc; border-radius:var(--radius-sm); padding:10px 12px; font-family:'Cascadia Code','Consolas',monospace; font-size:11.5px; line-height:1.75; height:110px; overflow-y:auto; margin-bottom:12px; }
.log .ok  { color:#6db36d; }
.log .er  { color:#f07070; }
.log .inf { color:#6ab0e0; }

/* Debug strip */
.debug-strip { display:flex; gap:8px; overflow-x:auto; padding-bottom:6px; margin-bottom:12px; }
.debug-item { flex-shrink:0; text-align:center; }
.debug-item canvas { display:block; width:120px; height:auto; border:1px solid var(--border); border-radius:6px; }
.debug-item span { display:block; font-size:10px; color:var(--muted); margin-top:4px; }

/* Score */
.score-row { display:grid; grid-template-columns:repeat(4,1fr); gap:8px; margin-bottom:14px; }
.metric { background:var(--bg); border:1px solid var(--border); border-radius:var(--radius-sm); padding:10px; text-align:center; }
.metric .v { font-size:22px; font-weight:600; line-height:1.2; }
.metric .l { font-size:10px; color:var(--muted); margin-top:2px; }
.metric.g .v { color:var(--green); }
.metric.r .v { color:var(--red); }
.metric.a .v { color:var(--amber); }

/* Tabs */
.tab-row { display:flex; gap:4px; margin-bottom:10px; border-bottom:1px solid var(--border); padding-bottom:8px; }
.tab2 { padding:5px 14px; border-radius:var(--radius-sm); font-size:12px; border:1px solid transparent; color:var(--muted); cursor:pointer; background:transparent; transition:all .15s; }
.tab2.on { background:var(--surface); color:var(--text); border-color:var(--border2); font-weight:500; }

/* Result overlay canvas */
#c-overlay { display:block; width:100%; max-height:500px; object-fit:contain; border-radius:var(--radius-sm); border:1px solid var(--border); background:var(--bg); }

/* Table */
.res-wrap { border:1px solid var(--border); border-radius:var(--radius-sm); overflow:hidden; }
.res-scroll { max-height:380px; overflow-y:auto; }
table { width:100%; border-collapse:collapse; font-size:12px; }
thead { position:sticky; top:0; z-index:1; }
th { padding:6px 8px; text-align:center; font-size:11px; font-weight:600; color:var(--muted); background:var(--bg); border-bottom:1px solid var(--border); }
td { padding:4px 8px; text-align:center; border-bottom:0.5px solid var(--border); }
tr:last-child td { border:none; }
tr:nth-child(even) td { background:#fafaf8; }
.b { display:inline-block; padding:2px 8px; border-radius:10px; font-size:11px; }
.b.ok    { background:var(--green-bg); color:var(--green); }
.b.err   { background:var(--red-bg);   color:var(--red); }
.b.multi { background:var(--amber-bg); color:var(--amber); }
.b.blank { background:var(--bg); color:var(--muted); border:1px solid var(--border); }

/* Scrollbar */
::-webkit-scrollbar { width:5px; height:5px; }
::-webkit-scrollbar-track { background:transparent; }
::-webkit-scrollbar-thumb { background:var(--border2); border-radius:3px; }
</style>
</head>
<body>
<div class="shell">

  <div class="header">
    <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
      <rect x="3" y="3" width="18" height="18" rx="2"/>
      <line x1="3" y1="9" x2="21" y2="9"/><line x1="3" y1="15" x2="21" y2="15"/>
      <line x1="9" y1="3" x2="9" y2="21"/><line x1="15" y1="3" x2="15" y2="21"/>
    </svg>
    <h1>OMR — ตรวจกระดาษคำตอบ 100 ข้อ</h1>
    <span class="badge">Classical Image Processing (Docker Backend)</span>
  </div>

  <div class="main">
    <div>
      <div class="card">
        <div class="card-title">กระดาษคำตอบ</div>
        <div class="upload-zone" id="drop-zone"
          onclick="document.getElementById('file-input').click()"
          ondragover="onDragOver(event)" ondragleave="onDragLeave(event)" ondrop="onDrop(event)">
          <div class="upload-icon">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
              <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
              <polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/>
            </svg>
          </div>
          <p>คลิกหรือลากรูปมาวาง</p>
          <small>JPG / PNG — กระดาษ 100 ข้อ 4 คอลัมน์</small>
        </div>
        <input type="file" id="file-input" accept="image/*" onchange="loadFile(this)">
        <img id="preview-img" alt="preview">
      </div>

      <div class="card">
        <div class="card-title">เฉลย Answer Key (100 ข้อ)</div>
        <input class="key-field" id="key-input"
          placeholder="ABCDE... (100 ตัว A–E)"
          oninput="onKeyInput()" maxlength="500">
        <div class="key-grid" id="key-grid"></div>
        <div class="btn-row">
          <button class="btn sm" onclick="randomKey()">สุ่มเฉลยทดสอบ</button>
          <button class="btn sm" onclick="clearKey()">ล้าง</button>
        </div>
      </div>

      <div class="card">
        <div class="card-title">ค่า Parameter</div>
        <div class="param-grid">
          <div class="param">
            <label>Fill threshold (0–1)</label>
            <input type="number" id="p-thresh" value="0.35" min="0.1" max="0.9" step="0.01"
              title="เพิ่มถ้า false positive, ลดถ้าฝนจาง">
          </div>
        </div>
        <div class="btn-row">
          <button class="btn primary" id="run-btn" onclick="runPipeline()" disabled>
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="5 3 19 12 5 21 5 3"/></svg>
            ตรวจคำตอบผ่านเซิร์ฟเวอร์
          </button>
        </div>
      </div>
    </div>

    <div>
      <div class="card">
        <div class="card-title">System Log</div>
        <div class="log" id="log-box">รอรูปภาพ...</div>
      </div>

      <div class="card" id="result-card" style="display:none">
        <div class="card-title">ผลการตรวจ</div>
        <div class="score-row">
          <div class="metric g"><div class="v" id="r-correct">—</div><div class="l">ถูก</div></div>
          <div class="metric r"><div class="v" id="r-wrong">—</div><div class="l">ผิด</div></div>
          <div class="metric a"><div class="v" id="r-blank">—</div><div class="l">ไม่ตอบ / เกิน</div></div>
          <div class="metric"><div class="v" id="r-pct">—</div><div class="l">คะแนน</div></div>
        </div>
        <div class="tab-row">
          <button class="tab2 on" onclick="switchTab('overlay')">รูป Overlay</button>
          <button class="tab2" onclick="switchTab('table')">ตารางผล</button>
        </div>
        <div id="tab-overlay">
          <canvas id="c-overlay"></canvas>
        </div>
        <div id="tab-table" style="display:none">
          <div class="res-wrap"><div class="res-scroll">
            <table>
              <thead><tr><th>ข้อ</th><th>ฝน</th><th>เฉลย</th><th>ผล</th><th style="text-align:left">Fill A B C D E</th></tr></thead>
              <tbody id="result-tbody"></tbody>
            </table>
          </div></div>
        </div>
      </div>

    </div>
  </div>
</div>

<script>
const CHOICES = 'ABCDE';
const N_QUESTIONS = 100;
let origImg = null;
let answerKey = Array(N_QUESTIONS).fill('');

// Drag & Drop
function onDragOver(e) { e.preventDefault(); document.getElementById('drop-zone').classList.add('drag'); }
function onDragLeave(e) { document.getElementById('drop-zone').classList.remove('drag'); }
function onDrop(e) { e.preventDefault(); onDragLeave(e); const f = e.dataTransfer.files[0]; if (f) readFile(f); }
function loadFile(inp) { if (inp.files[0]) readFile(inp.files[0]); }
function readFile(f) {
  const r = new FileReader();
  r.onload = ev => {
    const img = new Image();
    img.onload = () => {
      origImg = img;
      const p = document.getElementById('preview-img');
      p.src = ev.target.result; p.style.display = 'block';
      document.getElementById('run-btn').disabled = false;
      logMsg('โหลดรูป ' + img.width + '×' + img.height + ' พร้อมส่งตรวจ', 'inf');
    };
    img.src = ev.target.result;
  };
  r.readAsDataURL(f);
}

// Log & Helpers
function logMsg(msg, cls = '') {
  const b = document.getElementById('log-box');
  b.innerHTML += `<span${cls ? ' class="' + cls + '"' : ''}>${msg}</span><br>\n`;
  b.scrollTop = b.scrollHeight;
}
function gP(id)  { return parseFloat(document.getElementById(id).value) || 0; }

// Key UI
function onKeyInput() {
  const raw = document.getElementById('key-input').value.toUpperCase().split('').filter(c => CHOICES.includes(c));
  answerKey = Array(N_QUESTIONS).fill('');
  raw.forEach((c, i) => { if (i < N_QUESTIONS) answerKey[i] = c; });
  renderKeyGrid();
}
function renderKeyGrid() {
  const grid = document.getElementById('key-grid');
  grid.innerHTML = Array(N_QUESTIONS).fill(0).map((_, i) =>
    `<div class="kp${answerKey[i] ? ' set' : ''}">${i+1}:${answerKey[i] || '?'}</div>`
  ).join('');
}
function randomKey() {
  document.getElementById('key-input').value = Array(N_QUESTIONS).fill(0).map(() => CHOICES[Math.floor(Math.random() * 5)]).join('');
  onKeyInput();
}
function clearKey() { document.getElementById('key-input').value = ''; onKeyInput(); }

// Tab switch
function switchTab(id) {
  document.querySelectorAll('.tab2').forEach((t, i) =>
    t.classList.toggle('on', ['overlay','table'][i] === id));
  document.getElementById('tab-overlay').style.display = id === 'overlay' ? 'block' : 'none';
  document.getElementById('tab-table').style.display   = id === 'table'   ? 'block' : 'none';
}

// PIPELINE: ส่งรูปไปให้ Backend (Flask + OpenCV) จัดการ
async function runPipeline() {
  if (!origImg) { alert('กรุณาอัปโหลดรูปก่อน'); return; }
  
  const fileInput = document.getElementById('file-input');
  if (!fileInput.files[0]) return;

  const formData = new FormData();
  formData.append('image', fileInput.files[0]);
  formData.append('answer_key', answerKey.join(''));
  formData.append('fill_thresh', document.getElementById('p-thresh').value);

  document.getElementById('log-box').innerHTML = '<span class="inf">กำลังส่งรูปไปประมวลผลด้วย OpenCV ที่เซิร์ฟเวอร์...</span><br>';
  document.getElementById('run-btn').disabled = true;

  try {
    const response = await fetch('/process', {
      method: 'POST',
      body: formData
    });

    const data = await response.json();
    if (data.error) throw new Error(data.error);

    // อัปเดตคะแนน
    document.getElementById('r-correct').textContent = data.score.correct;
    document.getElementById('r-wrong').textContent = data.score.wrong;
    document.getElementById('r-blank').textContent = data.score.blank;
    document.getElementById('r-pct').textContent = data.score.correct + '%';

    // อัปเดตตาราง
    const tbody = document.getElementById('result-tbody');
    tbody.innerHTML = '';
    data.results.forEach(r => {
      const rsStr = r.ratios.map((val, i) => 
        `<span style="color:${val >= gP('p-thresh') ? 'var(--green)' : 'var(--hint)'}">
        ${CHOICES[i]}:${(val*100).toFixed(0)}%</span>`
      ).join(' ');

      tbody.innerHTML += `
        <tr>
          <td>${r.q}</td>
          <td style="font-family:monospace;font-weight:600">${r.ans || '—'}</td>
          <td>${r.key || '—'}</td>
          <td><span class="b ${r.cls}">${r.status}</span></td>
          <td style="font-size:11px;text-align:left;padding-left:12px">${rsStr}</td>
        </tr>`;
    });

    // แสดงรูป Overlay
    const overlayImg = document.getElementById('c-overlay');
    const ctx = overlayImg.getContext('2d');
    const img = new Image();
    img.onload = () => {
      overlayImg.width = img.width;
      overlayImg.height = img.height;
      ctx.drawImage(img, 0, 0);
    };
    img.src = data.overlay_image;

    document.getElementById('result-card').style.display = 'block';
    document.getElementById('log-box').innerHTML += '<span class="ok">ประมวลผลเสร็จสิ้น!</span><br>';

  } catch (error) {
    document.getElementById('log-box').innerHTML += `<span class="er">Error: ${error.message}</span><br>`;
  } finally {
    document.getElementById('run-btn').disabled = false;
  }
}

// Init
onKeyInput();
</script>
</body>
</html>
